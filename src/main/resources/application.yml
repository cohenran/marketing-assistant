spring:
  main:
    web-application-type: none      # batch/scheduled app — no HTTP server
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}     # the Gmail address that sends the digest (empty ok for --dry-run)
    password: ${MAIL_PASSWORD:}     # Gmail App Password (NOT your normal password)
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  datasource:
    url: jdbc:h2:file:./data/marketing;AUTO_SERVER=TRUE   # local file DB, survives restarts
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: -1                          # belt-and-suspenders: bind no port at all

app:
  # Runs DAILY at 09:00; each channel only generates when it's DUE (see cadence-days).
  schedule-cron: "0 0 9 * * *"
  email-to: duodatingapplication@gmail.com
  email-from: ${MAIL_USERNAME:}

  # Your own input files (git-ignored). Edit anytime.
  pain-points-file: pain-points.txt
  voice-file: voice.txt          # how YOU write — drafts mimic this tone
  assets-file: assets.txt        # screenshots/videos you have — drafts suggest which to attach

  # ---- Facts about your app — source material for every draft ----
  product:
    name: "DuoQuest"                          # <-- rename to your app
    tagline: "Play your way to a real connection."
    url: "https://duoquest.love"         # <-- REPLACE with your real app URL
    description: "A dating app that caps you at 4 active matches at a time, to encourage fewer, deeper connections instead of endless swiping."
    pricing: "Free to start."

  anthropic:
    model: claude-opus-4-8

  # ---- Channels. cadence-days controls auto-generation: ----
  #   7  = weekly,  14 = biweekly,  30 = monthly,  90 = quarterly
  #   0  = manual only (one-shot launches) — generate with --run-now="Channel Name"
  channels:
    # weekly organic
    - name: "TikTok / Reels scripts"
      format: "Three short video scripts, each with a hook line and a 15-30s outline."
      notes: "Punchy, native to short video. Lead with the anti-swiping angle."
      cadence-days: 7
    - name: "Twitter/X"
      format: "A 5-7 tweet thread, strong hook tweet first."
      notes: "Conversational, one idea per tweet."
      cadence-days: 7
    - name: "LinkedIn"
      format: "A single post, 120-200 words, story or insight format, 3-5 hashtags."
      notes: "Professional but human. Founder-journey angle works well."
      cadence-days: 7

    # biweekly
    - name: "Email / Newsletter blurb"
      format: "A subject line + a short email body to your list or a newsletter sponsor slot."
      notes: "Warm, direct. One clear CTA."
      cadence-days: 14

    # monthly
    - name: "Blog post (SEO)"
      format: "An SEO title + outline (H2s) + a 150-word intro. Target a 'dating app fatigue' search term."
      notes: "Helpful-first, product mentioned naturally near the end."
      cadence-days: 30
    - name: "r/SideProject"
      format: "A Reddit title line + a humble founder post body."
      notes: "Self-promo allowed here. Community-first; read the rules before posting."
      cadence-days: 30
    - name: "Indie Hackers"
      format: "A short post: the problem, what you built, and an ask for feedback."
      notes: "Founder audience, problem-first."
      cadence-days: 30
    - name: "Paid ad copy"
      format: "Three headline (<=40 chars) + primary-text variants for Reddit/Meta ads."
      notes: "Each with a clear CTA to the app link. These are A/B variants."
      cadence-days: 30

    # quarterly (set & refine)
    - name: "App Store listing"
      format: "Promotional text, a full description, and 10 ASO keywords."
      notes: "Keywords like 'slow dating', 'Tinder alternative', 'fewer matches'."
      cadence-days: 90

    # one-shot launches — manual only (--run-now="...")
    - name: "Product Hunt"
      format: "A tagline (<=60 chars), a 2-3 sentence description, and a founder 'first comment'."
      notes: "Launch-day tone, friendly, emoji ok. Use only when you actually launch."
      cadence-days: 0
    - name: "Show HN"
      format: "A title starting with 'Show HN:' then a plain, factual body of 1-2 short paragraphs."
      notes: "No hype, builder-to-builder. Use only at launch."
      cadence-days: 0

logging:
  level:
    com.duo.marketing: INFO
